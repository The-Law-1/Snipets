<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Snipets - Extension Settings</title>
		<style>
			body {
				font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
				margin: 0;
				padding: 2rem;
				background: #0f1724;
				color: #e6eef8;
			}
			.container {
				max-width: 500px;
				margin: 0 auto;
			}
			h1 {
				font-size: 1.5rem;
				margin-bottom: 1.5rem;
			}
			.row {
				margin-bottom: 1.5rem;
			}
			label {
				display: block;
				margin: 0.5rem 0 0.5rem;
				font-weight: 600;
				font-size: 0.9rem;
				color: #94a3b8;
			}
			input {
				width: 100%;
				padding: 0.75rem;
				box-sizing: border-box;
				background: #111827;
				border: 1px solid #334155;
				border-radius: 6px;
				color: #e6eef8;
				font-size: 1rem;
			}
			input:focus {
				outline: none;
				border-color: #ff7a18;
				box-shadow: 0 0 0 3px rgba(255, 122, 24, 0.1);
			}
			button {
				padding: 0.75rem 1.5rem;
				background: #ff7a18;
				color: #0b0b0b;
				border: none;
				border-radius: 6px;
				font-weight: 700;
				cursor: pointer;
				transition: all 0.2s ease;
			}
			button:hover:not(:disabled) {
				background: #ff6b00;
				transform: translateY(-2px);
				box-shadow: 0 4px 12px rgba(255, 122, 24, 0.3);
			}
			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			.hint {
				opacity: 0.7;
				font-size: 0.85rem;
				margin-top: 0.25rem;
				color: #94a3b8;
			}
			#status {
				display: block;
				margin-top: 1rem;
				color: #4ade80;
				font-size: 0.9rem;
			}
			#authSection {
				background: #111827;
				border-radius: 8px;
				padding: 1.5rem;
				border: 1px solid #1e293b;
			}
			#settingsSection {
				display: none;
				background: #111827;
				border-radius: 8px;
				padding: 1.5rem;
				border: 1px solid #1e293b;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>Snipets Extension Settings</h1>

			<div id="authSection">
				<h2 style="margin: 0 0 1rem 0; font-size: 1.1rem">Sign In</h2>
				<p style="margin: 0 0 1.5rem 0; font-size: 0.9rem; color: #94a3b8">
					Sign in with your Snipets account to save snippets.
				</p>

				<div class="row">
					<label for="email">Email</label>
					<input id="email" type="email" placeholder="your@email.com" />
				</div>

				<div class="row">
					<label for="password">Password</label>
					<input id="password" type="password" placeholder="••••••••" />
				</div>

				<button id="signIn">Sign In</button>
				<span id="status"></span>
			</div>

			<div id="settingsSection">
				<h2 style="margin: 0 0 1rem 0; font-size: 1.1rem">API Settings</h2>

				<div class="row">
					<label for="endpoint">API Endpoint</label>
					<input id="endpoint" type="url" placeholder="https://api.example.com" />
					<div class="hint">The URL where your API is running (e.g., https://api.yourdomain.com)</div>
				</div>

				<button id="save">Save Endpoint</button>
				<span id="status"></span>
			</div>
		</div>

		<script src="dist/options.js" type="module"></script>
	</body>
</html>
