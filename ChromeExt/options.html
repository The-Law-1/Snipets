<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1" />
		<title>Context Menu → API Settings</title>
		<style>
			body {
				font-family:
					system-ui,
					-apple-system,
					Segoe UI,
					Roboto,
					sans-serif;
				margin: 2rem;
			}
			label {
				display: block;
				margin: 0.5rem 0 0.25rem;
			}
			input {
				width: 100%;
				padding: 0.5rem;
				box-sizing: border-box;
			}
			.row {
				margin-bottom: 1rem;
			}
			button {
				padding: 0.5rem 1rem;
			}
			.hint {
				opacity: 0.7;
				font-size: 0.9rem;
			}
		</style>
	</head>
	<body>
		<h1>Send Selection → API</h1>

    <div>
      http://localhost:8000
    </div>

		<div class="row">
			<label for="endpoint">API Endpoint URL</label>
			<input
				id="endpoint"
				type="url"
				placeholder="https://api.example.com/ingest" />
			<div class="hint">Must also be allowed in <code>host_permissions</code> in <code>manifest.json</code>.</div>
		</div>
		<div class="row">
			<label for="apiKey">API Key (optional)</label>
			<input
				id="apiKey"
				type="text"
				placeholder="Bearer token or key" />
		</div>
		<div class="row">
			<button id="save">Save</button>
			<span
				id="status"
				class="hint"></span>
		</div>

		<script
			src="dist/options.js"
			type="module"></script>
	</body>
</html>
