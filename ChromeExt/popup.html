<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Snipets - Extension Popup</title>
		<style>
			:root {
				--bg: #162f2f;
				--bg-elevated: #1a3636;
				--panel: #1b3934;
				--panel-2: #1f423b;
				--text: #f3eadc;
				--muted: #c3ae8f;
				--border-soft: rgba(214, 189, 152, 0.16);
				--border-strong: rgba(214, 189, 152, 0.28);
				--accent: #d6bd98;
				--accent-600: #c8ac84;
				--accent-ink: #1a3636;
				--accent-ring: rgba(214, 189, 152, 0.28);
				--success: #91b48f;
				--danger: #f87171;
			}

			body {
				font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
				margin: 0;
				padding: 1rem;
				background: radial-gradient(circle at 8% -12%, rgba(214, 189, 152, 0.16), transparent 36%),
					linear-gradient(160deg, var(--bg) 0%, var(--bg-elevated) 100%);
				color: var(--text);
				min-width: 320px;
			}
			h1 {
				font-size: 1.1rem;
				margin: 0 0 1rem 0;
			}
			p {
				margin: 0 0 0.75rem 0;
				font-size: 0.9rem;
				color: var(--muted);
			}
			.row {
				margin-bottom: 0.85rem;
			}
			label {
				display: block;
				margin: 0 0 0.35rem;
				font-weight: 600;
				font-size: 0.82rem;
				color: var(--muted);
			}
			input {
				width: 100%;
				padding: 0.65rem;
				box-sizing: border-box;
				background: rgba(214, 189, 152, 0.05);
				border: 1px solid var(--border-soft);
				border-radius: 6px;
				color: var(--text);
				font-size: 0.95rem;
			}
			input:focus {
				outline: none;
				border-color: var(--accent);
				box-shadow: 0 0 0 3px var(--accent-ring);
			}
			.actions {
				display: flex;
				gap: 0.5rem;
			}
			.toggle-row {
				margin-top: 0.75rem;
			}
			.toggle-link {
				background: none;
				border: none;
				padding: 0;
				margin: 0;
				color: var(--accent);
				font-size: 0.85rem;
				cursor: pointer;
				font-weight: 500;
				text-align: left;
			}
			.toggle-link:hover {
				text-decoration: underline;
			}
			button {
				padding: 0.65rem 0.9rem;
				background: linear-gradient(180deg, var(--accent) 0%, var(--accent-600) 100%);
				color: var(--accent-ink);
				border: 1px solid var(--border-soft);
				border-radius: 6px;
				font-weight: 700;
				cursor: pointer;
				font-size: 0.85rem;
				flex: 1;
			}
			button:hover:not(:disabled) {
				transform: translateY(-1px);
				box-shadow: 0 8px 20px rgba(103, 125, 106, 0.35);
			}
			button.secondary {
				background: rgba(214, 189, 152, 0.08);
				color: var(--text);
			}
			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			#status {
				display: block;
				margin-top: 0.9rem;
				font-size: 0.85rem;
				color: var(--success);
				min-height: 1.2rem;
			}
			#status.error {
				color: var(--danger);
			}
			#authSection,
			#readySection {
				background: var(--panel-2);
				border-radius: 8px;
				padding: 1rem;
				border: 1px solid var(--border-soft);
			}
			.hidden {
				display: none;
			}
			a {
				color: var(--accent);
			}
		</style>
	</head>
	<body>
		<h1>Snipets</h1>

		<div id="authSection">
			<p>Sign in or create your account to save snippets.</p>

			<div class="row">
				<label for="email">Email</label>
				<input id="email" type="email" placeholder="your@email.com" />
			</div>

			<div class="row">
				<label for="password">Password</label>
				<input id="password" type="password" placeholder="••••••••" />
			</div>

			<div class="row hidden" id="confirmPasswordRow">
				<label for="confirmPassword">Confirm Password</label>
				<input id="confirmPassword" type="password" placeholder="••••••••" />
			</div>

			<div class="actions">
				<button id="signIn" type="button">Sign In</button>
				<button id="signUp" type="button" class="hidden">Create Account</button>
			</div>
			<div class="toggle-row">
				<button id="modeToggle" class="toggle-link" type="button">
					Don't have an account yet? Click here to create one
				</button>
			</div>
			<span id="status"></span>
		</div>

		<div id="readySection" class="hidden">
			<p id="readyMessage">You're all set.</p>
			<p>
				Consult your snippets here:
				<a id="webAppLink" href="#" target="_blank" rel="noopener noreferrer"></a>
			</p>
			<div class="actions">
				<button id="logout" type="button" class="secondary">Logout</button>
			</div>
		</div>

		<script src="dist/popup.js" type="module"></script>
	</body>
</html>
