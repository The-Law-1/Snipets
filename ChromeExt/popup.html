<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Snipets - Extension Popup</title>
		<style>
			body {
				font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
				margin: 0;
				padding: 1rem;
				background: #0f1724;
				color: #e6eef8;
				min-width: 320px;
			}
			h1 {
				font-size: 1.1rem;
				margin: 0 0 1rem 0;
			}
			p {
				margin: 0 0 0.75rem 0;
				font-size: 0.9rem;
				color: #94a3b8;
			}
			.row {
				margin-bottom: 0.85rem;
			}
			label {
				display: block;
				margin: 0 0 0.35rem;
				font-weight: 600;
				font-size: 0.82rem;
				color: #94a3b8;
			}
			input {
				width: 100%;
				padding: 0.65rem;
				box-sizing: border-box;
				background: #111827;
				border: 1px solid #334155;
				border-radius: 6px;
				color: #e6eef8;
				font-size: 0.95rem;
			}
			input:focus {
				outline: none;
				border-color: #ff7a18;
				box-shadow: 0 0 0 3px rgba(255, 122, 24, 0.1);
			}
			.actions {
				display: flex;
				gap: 0.5rem;
			}
			.toggle-row {
				margin-top: 0.75rem;
			}
			.toggle-link {
				background: none;
				border: none;
				padding: 0;
				margin: 0;
				color: #ff7a18;
				font-size: 0.85rem;
				cursor: pointer;
				font-weight: 500;
				text-align: left;
			}
			.toggle-link:hover {
				text-decoration: underline;
			}
			button {
				padding: 0.65rem 0.9rem;
				background: #ff7a18;
				color: #0b0b0b;
				border: none;
				border-radius: 6px;
				font-weight: 700;
				cursor: pointer;
				font-size: 0.85rem;
				flex: 1;
			}
			button.secondary {
				background: #1e293b;
				color: #e6eef8;
			}
			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			#status {
				display: block;
				margin-top: 0.9rem;
				font-size: 0.85rem;
				color: #4ade80;
				min-height: 1.2rem;
			}
			#status.error {
				color: #f87171;
			}
			#authSection,
			#readySection {
				background: #111827;
				border-radius: 8px;
				padding: 1rem;
				border: 1px solid #1e293b;
			}
			.hidden {
				display: none;
			}
			a {
				color: #ff7a18;
			}
		</style>
	</head>
	<body>
		<h1>Snipets</h1>

		<div id="authSection">
			<p>Sign in or create your account to save snippets.</p>

			<div class="row">
				<label for="email">Email</label>
				<input id="email" type="email" placeholder="your@email.com" />
			</div>

			<div class="row">
				<label for="password">Password</label>
				<input id="password" type="password" placeholder="••••••••" />
			</div>

			<div class="row hidden" id="confirmPasswordRow">
				<label for="confirmPassword">Confirm Password</label>
				<input id="confirmPassword" type="password" placeholder="••••••••" />
			</div>

			<div class="actions">
				<button id="signIn" type="button">Sign In</button>
				<button id="signUp" type="button" class="secondary hidden">Create Account</button>
			</div>
			<div class="toggle-row">
				<button id="modeToggle" class="toggle-link" type="button">
					Don't have an account yet? Click here to create one
				</button>
			</div>
			<span id="status"></span>
		</div>

		<div id="readySection" class="hidden">
			<p id="readyMessage">You're all set.</p>
			<p>
				Consult your snippets here:
				<a id="webAppLink" href="#" target="_blank" rel="noopener noreferrer"></a>
			</p>
			<div class="actions">
				<button id="logout" type="button" class="secondary">Logout</button>
			</div>
		</div>

		<script src="dist/popup.js" type="module"></script>
	</body>
</html>
