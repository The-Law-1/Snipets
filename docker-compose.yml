version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: snipets-postgres
    environment:
      POSTGRES_USER: snipets
      POSTGRES_PASSWORD: snipets
      POSTGRES_DB: snipets
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snipets"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./Web
      dockerfile: Dockerfile
    container_name: snipets-frontend
    working_dir: /app
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=http://localhost
      - VITE_API_PORT=${API_PORT:-8000}
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - ./Web:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: snipets-api
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://snipets:snipets@postgres:5432/snipets
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWKS_URL=${SUPABASE_JWKS_URL}
      - FRONTEND_URL=http://localhost:${WEB_PORT:-3000}
      - DISABLE_AUTH=${DISABLE_AUTH:-false}
      - AUTH_BYPASS_USER_ID=${AUTH_BYPASS_USER_ID:-test-user}
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: