version: '3.8'

services:
  frontend:
    build:
      context: ./Web
      dockerfile: Dockerfile
    container_name: snipets-frontend
    working_dir: /app
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - VITE_EDGE_URL=${VITE_EDGE_URL:-http://localhost:54321/functions/v1/api}
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - ./Web:/app
      - /app/node_modules